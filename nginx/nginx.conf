user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 1. Редирект с HTTP (80) на HTTPS (443)
    server {
        listen 80;
        server_name nikasolutions.shop www.nikasolutions.shop;
        return 301 https://$host$request_uri;
    }

    # 2. Основной сервер HTTPS
    server {
        listen 443 ssl;
        server_name nikasolutions.shop www.nikasolutions.shop;

        # Пути к сертификатам, которые выдал Certbot
        ssl_certificate /etc/letsencrypt/live/nikasolutions.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nikasolutions.shop/privkey.pem;

        # Оптимизация SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Frontend статика
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Выделенный роут для продуктов (фотографии)
        location /products/ {
            alias /usr/share/nginx/html/products/;
            autoindex off;
            access_log off;
            expires max;
            add_header Cache-Control "public, no-transform";
        }

        # Проксирование API запросов на FastAPI
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}